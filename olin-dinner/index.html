<style>
:root{color-scheme:light;--bg:#FFFFFF;--ink:#000000;--muted:#35424B;--blue:#009BDF;--blue-dark:#00458C;--silver:#A7A9AC;--line:rgba(167,169,172,.58);font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,rgba(0,155,223,.2),transparent 24rem),linear-gradient(145deg,#FFFFFF,#F5F8FA);color:var(--ink);overflow:hidden}
.gate{width:min(92vw,780px);display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.72fr);gap:clamp(1rem,4vw,4rem);align-items:center;padding:clamp(1rem,4vw,3rem);position:relative}
.ring{aspect-ratio:1;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;position:relative;background:#FFFFFF;animation:turn 18s linear infinite}
.ring:before,.ring:after{content:"";position:absolute;border-radius:50%;inset:10%;border:1px solid rgba(0,155,223,.55)}
.ring:after{inset:25%;border-color:var(--blue-dark);animation:pulse 2200ms ease-in-out infinite}
.ring span{font-family:"Avenir Next Condensed","Arial Narrow",sans-serif;font-size:7rem;font-weight:900;line-height:.8}
h1{font-family:"Avenir Next Condensed","Arial Narrow",sans-serif;font-size:5.2rem;line-height:.92;letter-spacing:0;margin:0 0 1rem;text-wrap:balance}
p{color:var(--muted);line-height:1.6}.signal{color:var(--blue-dark);font-weight:800}
form{display:grid;gap:.8rem;margin-top:1.5rem}label{font-weight:800}input{width:100%;min-height:50px;border:1px solid var(--line);border-radius:10px;background:#FFFFFF;color:var(--ink);padding:.85rem 1rem;font:inherit}input:focus-visible,button:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(0,155,223,.32)}
button{min-height:50px;border:0;border-radius:999px;background:var(--blue);color:white;font:inherit;font-weight:900;cursor:pointer}button:disabled{opacity:.68;cursor:wait}.err{min-height:1.4rem;color:#B33121;font-weight:800}
@keyframes turn{to{transform:rotate(360deg)}}@keyframes pulse{50%{transform:scale(.92);opacity:.55}}@media(max-width:720px){body{overflow:auto}.gate{grid-template-columns:1fr}.ring{max-width:260px;margin:auto}.ring span{font-size:4.5rem}h1{font-size:3.4rem}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:1ms!important;animation-iteration-count:1!important;transition-duration:1ms!important}}
</style>
</head>
<body>
<main class="gate">
  <div class="ring" aria-hidden="true"><span>12</span></div>
  <section aria-labelledby="gate-title">
    <p class="signal">You've been invited to a private dinner</p>
    <h1 id="gate-title">The table is encrypted.</h1>
    <p>Enter the shared password to open the invitation, RSVP, venue notes, and guest directory.</p>
    <form id="unlock-form">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" autofocus>
      <button id="unlock-button" type="submit">Unlock dinner</button>
      <div class="err" id="unlock-error" role="status"></div>
    </form>
  </section>
</main>

function b64(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function unlock(pw){var enc=new TextEncoder();var material=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(PAYLOAD.salt),iterations:PAYLOAD.iter,hash:"SHA-256"},material,{name:"AES-GCM",length:256},false,["decrypt"]);var plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(PAYLOAD.iv)},key,b64(PAYLOAD.data));return new TextDecoder().decode(plain)}
